syntax = "proto3";

package example.v1;

option go_package = "example.com/api/v1";

// GreeterService provides greeting RPCs.
service GreeterService {
    // SayHello sends a greeting.
    rpc SayHello(HelloRequest) returns (HelloResponse) {}
    // SayGoodbye sends a farewell.
    rpc SayGoodbye(GoodbyeRequest) returns (GoodbyeResponse) {}
}

// HelloRequest is the request for SayHello.
message HelloRequest {
    string name = 1;
    int32 age = 2;
}

// HelloResponse is the response for SayHello.
message HelloResponse {
    string message = 1;
}

message GoodbyeRequest {
    string name = 1;
}

message GoodbyeResponse {
    string message = 1;
}

// Status enumerates request statuses.
enum Status {
    UNKNOWN = 0;
    OK = 1;
    ERROR = 2;
}
